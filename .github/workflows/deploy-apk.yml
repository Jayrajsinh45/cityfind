name: Build and Deploy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install dependencies
      run: npm install

    - name: Build web application (with /cityfind prefix for GitHub Pages)
      run: npm run build
      env:
        CI: false

    - name: Deploy Web App to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build

    - name: Upload Web Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CityFind-Web-Build
        path: build/

  build-apk:
    runs-on: ubuntu-latest
    needs: build-web

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: npm install

    - name: Install Capacitor v5 & Assets
      run: |
        npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/android@5
        npm install @capacitor/assets --save-dev

    - name: Build React app with PUBLIC_URL=/ for APK
      run: npm run build
      env:
        CI: false
        PUBLIC_URL: /

    - name: Initialise and sync Capacitor
      run: |
        npx cap init CityFind com.jayrajsinh45.cityfind --web-dir build
        npx cap add android
        npx cap sync android

    - name: Generate Android Launch Icons and Splash Screens
      run: |
        npx @capacitor/assets generate --android

    - name: Print build config (debug)
      run: |
        echo "=== Gradle wrapper ==="
        cat android/gradle/wrapper/gradle-wrapper.properties
        echo "=== build.gradle ==="
        cat android/build.gradle
        echo "=== index.html check ==="
        head -10 build/index.html

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: CityFind-Android-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
